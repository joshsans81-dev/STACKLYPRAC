<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: rgb(29, 61, 61);
            background-color: rgb(247, 249, 249);
           
        }
        table{
            border-radius: 10px;
            padding: 20px;
        }
        th{
            border-right: 2px rgb(17, 178, 167);
        }
        li{
            list-style-type:decimal;
            font-size: larger;
            display: inline;
            width: 20px;
            padding: 40px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 27px;
            font-style: bold;
        }
        a{
            text-decoration: none;
            color: rgb(29, 61, 61);

        }
        a:hover{
            font-size: 18px;
            transition: 0.2s;
            color: rgb(17, 178, 167);
        }
        li:hover{
            font-size: 28px;
            transition: 0.2s;
            color: rgb(17, 178, 167);
        }
        h1:hover{
            color:rgb(17, 178, 167);
        }

        td{
            padding:20px;
        }
    </style>
</head>
<body>
    <table align="center">
        <tr style="background-color: rgb(166, 192, 199);">
            <th height="70px" style="text-align: center; " colspan="8"><h1>STACKLY</h1></th></tr>
        <tr height=80px>
            
            <th width="200px"></th>
            <th width="200px"><a href="index.html">HOME</a></th>
            <th width="200px"><a href="index.html">ABOUT US</a></th>
            <th width="200PX"><a href="index.html">OUR SERVICES</a></th>
            <th width="200px"><a href="index.html">CAREERS</a></th>
            <th width="200px"><button type="submit"><a href="#">LOGIN</a></button></th>
        </tr>

        <table align="center" style="background-color:  rgb(166, 192, 199);"">
            <tr>
                <th colspan="8">LOGIN FORM</th>
            </tr> 
            <tr>
                <td width="150px">
                    <label name="Fname">First Name:</label>
                </td>
                <td>
                    <input type="text" name="Fname">
                </td>
            </tr>
            <tr>
                <td width="150px">
                    <label name="Sname">Second Name:</label>
                </td>
                <td>
                    <input type="text" name="Sname">
                </td>
            </tr>
            <tr>
                <td width="150px">
                    <label name="pass">Password:</label>
                </td>
                <td>
                    <input type="password" name="pass" value="">
                </td>
            </tr>

            <tr>
                <td width="150px">
                    <label name="date">DOB:</label>
                </td>
                <td>
                    <input type="date" name="date">
                </td>
            </tr>
            <tr>
                <TD><button type="submit"><a>SUBMIT INFO</a></button></TD>
                
            </tr>
        </table>
    </table>
    </body>
</html>
