<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
       body{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: rgb(166, 216, 216);
            background: linear-gradient(to right, rgb(27, 27, 31), rgb(56, 117, 139));
           
        }
        
        li{
            list-style-type:decimal;
            font-size: larger;
            display: inline;
            width: 20px;
            padding: 40px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 27px;
            font-style: bold;
        }
        a{
            text-decoration: none;
            color: rgb(11, 224, 224);

        }
        a:hover{
            font-size: 18px;
            transition: 0.2s;
            color: rgb(9, 247, 172);
        }
        li:hover{
            font-size: 28px;
            transition: 0.2s;
            color: rgb(135, 239, 232);
        }
        h1:hover{
            color:rgb(135, 239, 232);
        }
        button{
            background-color: rgba(6, 105, 105, 0.468);
            padding: 10px;
            border-radius: 20px;
            font-size: 20px;
            border: solid 2px rgb(8, 191, 219);
        }

        table{
            
            border-radius: 20px;
        }
        tr{
            height: 50px;
        }
        .form{
            padding:20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <table align="center">
        <tr style="background-color: rgb(24, 56, 65);">
            <th height="70px" style="text-align: center; " colspan="8"><h1>STACKLY</h1></th></tr>
        <tr height=80px>
            
            <th width="200px"></th>
            <th width="200px"><a href="index.html">HOME</a></th>
            <th width="200px"><a href="index.html">ABOUT US</a></th>
            <th width="200PX"><a href="index.html">OUR SERVICES</a></th>
            <th width="200px"><a href="index.html">CAREERS</a></th>
            <th width="200px"><button type="submit"><a href="#">LOGIN</a></button></th>
        </tr>

        <table class="form" align="center" style="background-color:  rgb(25, 81, 96);"">
            <tr>
                <th colspan="8">LOGIN FORM</th>
            </tr> 
            <tr>
                <td width="150px">
                    <label name="Fname">First Name:</label>
                </td>
                <td>
                    <input type="text" name="Fname">
                </td>
            </tr>
            <tr>
                <td width="150px">
                    <label name="Sname">Second Name:</label>
                </td>
                <td>
                    <input type="text" name="Sname">
                </td>
            </tr>
            <tr>
                <td width="150px">
                    <label name="pass">Password:</label>
                </td>
                <td>
                    <input type="password" name="pass" value="">
                </td>
            </tr>

            <tr>
                <td width="150px">
                    <label name="date">DOB:</label>
                </td>
                <td>
                    <input type="date" name="date">
                </td>
            </tr>
            <tr>
                <TD colspan="2" align="center"><button type="submit"><a>SUBMIT</a></button></TD>
                
            </tr>
        </table>
    </table>
    </body>
</html>
